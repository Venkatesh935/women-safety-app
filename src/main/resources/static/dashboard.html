<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suraksha Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">

  <div class="mobile-app">

    <!-- Top Header -->
    <header class="top-bar">
      <div>
        <p class="welcome-text">Welcome Back</p>
        <h1 class="user-name">Suraksha</h1>
      </div>
      <button class="icon-btn" id="profileBtn" aria-label="Profile">
        ☰
      </button>
    </header>

    <!-- Emergency Status Card -->
    <section class="status-card">
      <div>
        <p class="status-label">Current Status</p>
        <h2 class="status-safe">You Are Safe</h2>
      </div>
      <span class="pulse-dot"></span>
    </section>

    <!-- SOS Main Button -->
    <section class="sos-section">
      <button class="sos-button" id="sosButton">
        <span>SOS</span>
      </button>
      <p class="sos-note">Tap once to send emergency alert</p>
    </section>

    <!-- Quick Actions -->
    <section class="section-block">
      <div class="section-title-row">
        <h3>Quick Actions</h3>
      </div>
      
    <div class="action-grid">
        <button class="action-card" id="alarmBtn">
          <div class="action-icon">🔊</div>
          <p>Loud Alarm</p>
        </button>


        <button class="action-card" id="locationBtn">
          <div class="action-icon">📍</div>
          <p>Live Location</p>
        </button>

        <button class="action-card" id="voiceBtn">
          <div class="action-icon">🎤</div>
          <p>Voice SOS</p>
        </button>

        <button class="action-card" id="contactsBtn">
          <div class="action-icon">👥</div>
          <p>Contacts</p>
        </button>
        
       <button class="action-card" onclick="window.location.href='map.html'">
  			<div class="action-icon">🚔</div>
  			<p>Nearby Police</p>
	   </button>
      </div>
    </section>

    <!-- Recent Activity -->
    <section class="section-block">
      <div class="section-title-row">
        <h3>Recent Activity</h3>
      </div>

      <div class="activity-list">
        <div class="activity-item">
          <div class="activity-left">
            <div class="activity-badge pink">SOS</div>
            <div>
              <h4>Emergency Alert Ready</h4>
              <p>System configured successfully</p>
            </div>
          </div>
          <span class="activity-time">Now</span>
        </div>

        <div class="activity-item">
          <div class="activity-left">
            <div class="activity-badge purple">GPS</div>
            <div>
              <h4>Location Tracking</h4>
              <p>Permission can be connected later</p>
            </div>
          </div>
          <span class="activity-time">--</span>
        </div>
      </div>
    </section>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>

      <a href="dashboard.html" class="nav-item active">
        <span>🛡️</span>
        <small>Dashboard</small>
      </a>

      <a href="contacts.html" class="nav-item">
        <span>👥</span>
        <small>Contacts</small>
      </a>

      <a href="sos.html" class="nav-item">
        <span>🚨</span>
        <small>SOS</small>
      </a>
    </nav>

  </div>

  <script src="dashboard.js"></script>
</body>
</html>
