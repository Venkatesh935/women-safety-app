<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Suraksha</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">

  <div class="mobile-app auth-screen">

    <div class="auth-header">
      <a href="../index.html" class="back-btn">←</a>
      <h1>Create Account</h1>
      <p>Register to use your personal safety dashboard</p>
    </div>

    <div class="auth-brand-card">
      <div class="brand-icon">💖</div>
      <h2>Join Suraksha</h2>
      <p>Stay protected with instant emergency features</p>
    </div>

    <form class="auth-form" id="registerForm">
      <div class="input-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required />
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>

      <div class="input-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create password" required />
      </div>

      <button type="submit" class="auth-submit-btn">Create Account</button>
      <p class="form-message" id="registerMessage"></p>
    </form>

    <div class="auth-footer">
      <p>Already have an account?</p>
      <a href="login.html">Login</a>
    </div>

  </div>

  <script src="register.js"></script>
</body>
</html>
